version: '3.8'

services:
  telemetry-agent:
    build:
      context: .
    container_name: agent_monitor
    restart: unless-stopped
    pid: "host"
    network_mode: "host"
    environment:
      - DB_HOST=127.0.0.1
      - DB_PORT=6432
      - DB_NAME=telemetry_db
      - DB_USER=admin
      - DB_PASSWORD=password
      - COLLECT_INTERVAL=5
      - PROCFS_PATH=/host/proc
    volumes:
      - ./logs:/app/logs
      - ./buffer:/app/buffer
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/os-release:/etc/os-release:ro